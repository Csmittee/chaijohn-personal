<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaijohn Dashboard — Setup</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    .setup-container {
      max-width: 500px;
      margin: 4rem auto;
      padding: 0 1rem;
    }
    .step-card {
      margin-bottom: 1.5rem;
    }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-primary);
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }
    .status-log {
      font-family: monospace;
      font-size: 0.82rem;
      background: var(--bg-page);
      padding: 1rem;
      border-radius: var(--radius);
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid var(--border);
      margin-top: 0.75rem;
    }
    .log-ok   { color: var(--color-income); }
    .log-err  { color: var(--color-expense); }
    .log-info { color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="setup-container">
    <h1 style="text-align:center;margin-bottom:0.5rem">🏠 Chaijohn Dashboard</h1>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:2rem">First-time Setup</p>

    <!-- Step 1: Set PIN -->
    <div class="card step-card" id="step-pin">
      <h2 style="margin-bottom:1rem;display:flex;align-items:center">
        <span class="step-num">1</span>Create Your PIN
      </h2>
      <div class="form-group">
        <label for="setup-pin">PIN (4-6 digits)</label>
        <input type="password" id="setup-pin" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="setup-pin-confirm">Confirm PIN</label>
        <input type="password" id="setup-pin-confirm" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="new-password">
      </div>
      <div id="pin-error" style="color:var(--color-expense);font-size:0.85rem;margin-bottom:0.75rem;display:none"></div>
      <button class="btn btn-primary w-full" id="set-pin-btn">Set PIN</button>
      <div id="pin-success" style="color:var(--color-income);text-align:center;margin-top:0.75rem;display:none">✓ PIN set successfully</div>
    </div>

    <!-- Step 2: Initialize Airtable schema -->
    <div class="card step-card" id="step-schema" style="opacity:0.5;pointer-events:none">
      <h2 style="margin-bottom:0.5rem;display:flex;align-items:center">
        <span class="step-num">2</span>Initialize Airtable Schema
      </h2>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:1rem">
        This creates all required tables in your Airtable base. Run once only.
      </p>
      <button class="btn btn-primary w-full" id="init-schema-btn">Initialize Schema</button>
      <div class="status-log hidden" id="schema-log"></div>
    </div>

    <!-- Step 3: Done -->
    <div class="card step-card hidden" id="step-done">
      <h2 style="margin-bottom:0.75rem">✅ Setup Complete</h2>
      <p style="color:var(--text-secondary);margin-bottom:1rem">
        Everything is ready. Go to the dashboard to start using Chaijohn.
      </p>
      <a href="/dashboard.html" class="btn btn-primary w-full">Open Dashboard</a>
    </div>
  </div>

  <script>
  // Setup page — self-contained, no auth.js required
  const setBtn    = document.getElementById('set-pin-btn');
  const initBtn   = document.getElementById('init-schema-btn');
  const step2     = document.getElementById('step-schema');
  const pinErr    = document.getElementById('pin-error');
  const pinSuccess = document.getElementById('pin-success');
  const schemaLog = document.getElementById('schema-log');

  setBtn.addEventListener('click', async () => {
    const pin  = document.getElementById('setup-pin').value;
    const conf = document.getElementById('setup-pin-confirm').value;
    pinErr.style.display = 'none';

    if (!/^\d{4,6}$/.test(pin)) {
      pinErr.textContent = 'PIN must be 4-6 digits';
      pinErr.style.display = 'block';
      return;
    }
    if (pin !== conf) {
      pinErr.textContent = 'PINs do not match';
      pinErr.style.display = 'block';
      return;
    }

    setBtn.disabled = true;
    setBtn.textContent = 'Setting PIN…';
    try {
      const r = await fetch('/api/auth/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      if (!r.ok) throw new Error(await r.text());

      pinSuccess.style.display = 'block';
      step2.style.opacity = '1';
      step2.style.pointerEvents = 'all';
      setBtn.textContent = 'PIN Set ✓';
    } catch (e) {
      pinErr.textContent = e.message;
      pinErr.style.display = 'block';
      setBtn.disabled = false;
      setBtn.textContent = 'Set PIN';
    }
  });

  initBtn.addEventListener('click', async () => {
    schemaLog.classList.remove('hidden');
    initBtn.disabled = true;
    initBtn.textContent = 'Initializing…';

    const log = (msg, cls = 'log-info') => {
      const d = document.createElement('div');
      d.className = cls;
      d.textContent = msg;
      schemaLog.appendChild(d);
      schemaLog.scrollTop = schemaLog.scrollHeight;
    };

    log('Starting Airtable schema initialization…');
    try {
      const r = await fetch('/api/setup/schema', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await r.json();

      if (data.results) {
        data.results.forEach(item => {
          const ok = item.status === 'created' || item.status === 'exists';
          log(
            `${ok ? '✓' : '⚠'} ${item.table}: ${item.status}`,
            ok ? 'log-ok' : 'log-err'
          );
        });
      }

      if (r.ok) {
        log('Schema initialization complete!', 'log-ok');
        document.getElementById('step-done').classList.remove('hidden');
        initBtn.textContent = 'Done ✓';
      } else {
        log(`Error: ${data.error || 'Unknown error'}`, 'log-err');
        initBtn.disabled = false;
        initBtn.textContent = 'Retry';
      }
    } catch (e) {
      log('Error: ' + e.message, 'log-err');
      initBtn.disabled = false;
      initBtn.textContent = 'Retry';
    }
  });
  </script>
</body>
</html>
