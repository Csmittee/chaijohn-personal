<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaijohn — Entry</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="main-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/dashboard.html">🏠 Chaijohn</a>
      <a class="nav-link" href="/dashboard.html">Dashboard</a>
      <a class="nav-link active" href="/entry.html">Entry</a>
      <a class="nav-link" href="/diary.html">Diary</a>
      <a class="nav-link" href="/collection.html">Collection</a>
      <a class="nav-link" href="/ai-advisor.html">AI Advisor</a>
      <button class="nav-link nav-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="page-content">

    <!-- Top-level tabs -->
    <div class="tabs" id="entry-tabs">
      <button class="tab-btn active" data-tab="transactions">Transactions</button>
      <button class="tab-btn" data-tab="utilities">Utilities</button>
      <button class="tab-btn" data-tab="liabilities">Liabilities</button>
      <button class="tab-btn" data-tab="budgets">Budgets</button>
    </div>

    <!-- ── Transactions Tab ── -->
    <div class="tab-panel active" id="transactions-tab">

      <!-- Quick-add form (sticky) -->
      <div class="card" style="margin-bottom:1rem;position:sticky;top:calc(var(--nav-height) + 0.5rem);z-index:100">
        <div class="flex items-center gap-1" style="margin-bottom:1rem">
          <button class="btn btn-lg btn-success" id="type-income" data-type="Income">EARN</button>
          <button class="btn btn-lg btn-outline" id="type-expense" data-type="Expense">EXPENSE</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="tx-amount">Amount (฿)</label>
            <input type="number" id="tx-amount" placeholder="0" step="1" inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="tx-category">Category</label>
            <select id="tx-category"></select>
            <div id="tx-budget-bar" style="display:none;margin-top:0.35rem;font-size:0.78rem;color:var(--text-secondary)"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="tx-description">Description</label>
            <input type="text" id="tx-description" placeholder="What was this for?">
          </div>
          <div class="form-group">
            <label for="tx-entity">Entity / Person / Platform</label>
            <input type="text" id="tx-entity" placeholder="Who or where">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="tx-date">Date</label>
            <input type="date" id="tx-date">
          </div>
          <div class="form-group">
            <label for="tx-note">Note (optional)</label>
            <input type="text" id="tx-note" placeholder="Extra note">
          </div>
        </div>
        <button class="btn btn-primary w-full btn-lg" id="save-tx">Save Transaction</button>
      </div>

      <!-- Transaction list with sub-period tabs -->
      <div class="tabs" id="tx-period-tabs">
        <button class="tab-btn active" data-txperiod="daily">Daily</button>
        <button class="tab-btn" data-txperiod="weekly">Weekly</button>
        <button class="tab-btn" data-txperiod="monthly">Monthly</button>
      </div>
      <div id="tx-list"></div>
    </div>

    <!-- ── Utilities Tab ── -->
    <div class="tab-panel" id="utilities-tab">
      <div class="card" style="margin-bottom:1rem">
        <div class="section-header">
          <span class="section-title">Utilities Entry</span>
          <input type="month" id="util-month" style="width:auto">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="util-elec-units">Electricity Units Used</label>
            <input type="number" id="util-elec-units" placeholder="kWh" step="0.01">
          </div>
          <div class="form-group">
            <label for="util-elec-charge">Electricity Charge (฿)</label>
            <input type="number" id="util-elec-charge" placeholder="฿" step="0.01">
          </div>
        </div>
        <div id="elec-rate-display" style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:0.5rem"></div>
        <div id="elec-vs-prev" style="font-size:0.82rem;margin-bottom:1rem"></div>

        <div class="form-row">
          <div class="form-group">
            <label for="util-water-units">Water Units Used</label>
            <input type="number" id="util-water-units" placeholder="units" step="0.01">
          </div>
          <div class="form-group">
            <label for="util-water-charge">Water Charge (฿)</label>
            <input type="number" id="util-water-charge" placeholder="฿" step="0.01">
          </div>
        </div>
        <div id="water-rate-display" style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:0.5rem"></div>
        <div id="water-vs-prev" style="font-size:0.82rem;margin-bottom:1rem"></div>

        <div class="form-group">
          <label for="util-notes">Notes</label>
          <textarea id="util-notes" rows="2"></textarea>
        </div>
        <!-- Fix 16: FT note field -->
        <div class="form-group">
          <label for="util-ft-note">FT Note (factor / technical)</label>
          <textarea id="util-ft-note" rows="2"
            placeholder="e.g. Rate changed 3.50→4.20 baht/unit, meter replaced, estimated reading"></textarea>
        </div>
        <button class="btn btn-primary w-full" id="save-util">Save Utilities</button>
      </div>

      <div class="card">
        <div class="section-header">
          <span class="section-title">Last 12 Months</span>
        </div>
        <div id="util-history-table"></div>
        <div style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="chart-container" style="height:140px">
            <canvas id="elec-chart"></canvas>
          </div>
          <div class="chart-container" style="height:140px">
            <canvas id="water-chart"></canvas>
          </div>
        </div>

        <!-- Fix 15: Year-over-Year Trend Charts -->
        <div id="yoy-section" style="margin-top:1.5rem">
          <div style="display:flex;align-items:center;justify-content:space-between;
            margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem">
            <span class="section-title" style="font-size:0.9rem">Year-over-Year Trends</span>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.82rem;
              color:var(--text-secondary)">
              <span>From</span>
              <select id="yoy-from-year"
                style="width:auto;padding:0.2rem 0.5rem;font-size:0.82rem"></select>
              <span>to</span>
              <select id="yoy-to-year"
                style="width:auto;padding:0.2rem 0.5rem;font-size:0.82rem"></select>
            </div>
          </div>
          <div id="yoy-legend" style="display:flex;gap:1rem;flex-wrap:wrap;
            margin-bottom:0.75rem;font-size:0.78rem"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div>
              <div style="font-size:0.75rem;color:var(--text-secondary);
                margin-bottom:0.2rem;font-weight:500">Electricity Units</div>
              <div class="chart-container" style="height:160px">
                <canvas id="yoy-elec-units"></canvas>
              </div>
            </div>
            <div>
              <div style="font-size:0.75rem;color:var(--text-secondary);
                margin-bottom:0.2rem;font-weight:500">Electricity Charge ฿</div>
              <div class="chart-container" style="height:160px">
                <canvas id="yoy-elec-charge"></canvas>
              </div>
            </div>
            <div>
              <div style="font-size:0.75rem;color:var(--text-secondary);
                margin-bottom:0.2rem;font-weight:500">Water Units</div>
              <div class="chart-container" style="height:160px">
                <canvas id="yoy-water-units"></canvas>
              </div>
            </div>
            <div>
              <div style="font-size:0.75rem;color:var(--text-secondary);
                margin-bottom:0.2rem;font-weight:500">Water Charge ฿</div>
              <div class="chart-container" style="height:160px">
                <canvas id="yoy-water-charge"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Liabilities Tab ── -->
    <div class="tab-panel" id="liabilities-tab">

      <!-- Log a payment -->
      <div class="card" style="margin-bottom:1rem">
        <div class="section-header">
          <span class="section-title">Log a Payment</span>
        </div>
        <div class="form-group">
          <label for="payment-liability-select">Liability</label>
          <select id="payment-liability-select"></select>
        </div>
        <div id="payment-interest-preview" style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:0.5rem;display:none"></div>
        <div class="form-row">
          <div class="form-group">
            <label for="payment-amount">Payment Amount (฿)</label>
            <input type="number" id="payment-amount" placeholder="฿">
          </div>
          <div class="form-group">
            <label for="payment-date">Payment Date</label>
            <input type="date" id="payment-date">
          </div>
        </div>
        <div class="form-group">
          <label for="payment-note">Note</label>
          <input type="text" id="payment-note" placeholder="Optional note">
        </div>
        <button class="btn btn-success w-full" id="save-payment">Log Payment</button>
      </div>

      <!-- Add new liability (collapsible) -->
      <div class="card" style="margin-bottom:1rem">
        <button id="liab-form-toggle"
          style="width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:0;
          display:flex;align-items:center;justify-content:space-between;font-family:inherit">
          <span class="section-title">＋ Add New Liability</span>
          <span id="liab-form-chevron"
            style="transition:transform 0.3s ease;display:inline-block;color:var(--text-secondary);font-size:0.85rem">▼</span>
        </button>
        <div id="liab-form-body" style="overflow:hidden;max-height:0;transition:max-height 0.3s ease">
          <div style="padding-top:1rem">
            <div class="form-row">
              <div class="form-group">
                <label for="liab-name">Liability Name</label>
                <input type="text" id="liab-name" placeholder="Bank / Person / Card">
              </div>
              <div class="form-group">
                <label for="liab-creditor-type">Creditor Type</label>
                <select id="liab-creditor-type">
                  <option value="Bank">Bank</option>
                  <option value="Family">Family</option>
                  <option value="Friend">Friend</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="liab-loan-size">Loan Size (฿)</label>
                <input type="number" id="liab-loan-size" placeholder="Original loan amount">
              </div>
              <div class="form-group">
                <label for="liab-balance">Current Balance (฿)</label>
                <input type="number" id="liab-balance" placeholder="Remaining balance">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="liab-rate">Interest Rate (% p.a.)</label>
                <input type="number" id="liab-rate" step="0.01" placeholder="e.g. 7.5">
              </div>
              <div class="form-group">
                <label for="liab-monthly">Monthly Payment (฿)</label>
                <input type="number" id="liab-monthly" placeholder="฿">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="liab-start">Start Date</label>
                <input type="date" id="liab-start">
              </div>
              <div class="form-group">
                <label for="liab-notes">Notes</label>
                <input type="text" id="liab-notes" placeholder="Optional notes">
              </div>
            </div>
            <button class="btn btn-primary w-full" id="save-liability">Add Liability</button>
          </div>
        </div>
      </div>

      <!-- Active liabilities list -->
      <div class="card">
        <div class="section-header">
          <span class="section-title">Active Liabilities</span>
        </div>
        <div id="active-liabilities-table"></div>
      </div>
    </div>

    <!-- ── Budgets Tab ── -->
    <div class="tab-panel" id="budgets-tab">

      <!-- Create budget form -->
      <div class="card" style="margin-bottom:1rem">
        <div class="section-header">
          <span class="section-title">Create Budget</span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="budget-label">Label</label>
            <input type="text" id="budget-label" placeholder="Budget name">
          </div>
          <div class="form-group">
            <label for="budget-category">Category</label>
            <select id="budget-category"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="budget-amount">Amount (฿)</label>
            <input type="number" id="budget-amount" placeholder="฿">
          </div>
          <div class="form-group">
            <label for="budget-period">Period</label>
            <select id="budget-period">
              <option value="Monthly">Monthly</option>
              <option value="Annual">Annual</option>
              <option value="One-time">One-time</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="budget-start">Start Date</label>
            <input type="date" id="budget-start">
          </div>
          <div class="form-group">
            <label for="budget-end">End Date (optional)</label>
            <input type="date" id="budget-end">
          </div>
        </div>
        <button class="btn btn-primary w-full" id="save-budget">Create Budget</button>
      </div>

      <!-- Active budgets list -->
      <div class="card">
        <div class="section-header">
          <span class="section-title">Active Budgets</span>
        </div>
        <!-- Fix 22: view + group control bar -->
        <div id="budget-control-bar"
          style="display:flex;justify-content:space-between;align-items:center;
          margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <div class="period-toggle">
              <button class="period-btn active" data-budget-view="row">≡ Row</button>
              <button class="period-btn" data-budget-view="card">⊞ Card</button>
            </div>
            <div class="period-toggle">
              <button class="period-btn active" data-budget-group="all">All</button>
              <button class="period-btn" data-budget-group="byCategory">By Category</button>
            </div>
          </div>
          <div id="budget-group-actions" style="display:none;gap:0.75rem;align-items:center">
            <button id="budget-expand-all"
              style="background:none;border:none;cursor:pointer;font-size:0.82rem;
              color:var(--color-primary);font-family:inherit;padding:0">Expand all</button>
            <button id="budget-collapse-all"
              style="background:none;border:none;cursor:pointer;font-size:0.82rem;
              color:var(--color-primary);font-family:inherit;padding:0">Collapse all</button>
          </div>
        </div>
        <div id="budgets-list"></div>
      </div>
    </div>

  </main>

  <script src="/assets/js/auth.js" defer></script>
  <script src="/assets/js/dropzone.js" defer></script>
  <script src="/assets/js/entry.injector.js" defer></script>
</body>
</html>
